name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Python: API ─────────────────────────────────────────────────────────────
  api-lint-test:
    name: API — Lint + Type-check + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type-check
        run: uv run mypy . --ignore-missing-imports
        continue-on-error: true   # non-blocking until Phase B models are complete

      - name: Run Alembic migrations
        env:
          DATABASE_SYNC_URL: postgresql://test:test@localhost:5433/testdb
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/testdb
          REDIS_URL: redis://localhost:6380/0
          SECRET_KEY: ci_test_secret_key_not_for_production
        run: uv run alembic upgrade head
        continue-on-error: true   # non-blocking until Phase B migration exists

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/testdb
          REDIS_URL: redis://localhost:6380/0
          SECRET_KEY: ci_test_secret_key_not_for_production
          ENVIRONMENT: development
        run: uv run pytest --cov=. --cov-report=xml --cov-fail-under=80
        continue-on-error: true   # non-blocking until Phase B tests exist

  # ─── Python: Crawler ─────────────────────────────────────────────────────────
  crawler-lint-test:
    name: Crawler — Lint + Fixture Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Fixture tests (adapter regression)
        run: uv run pytest tests/ -v
        continue-on-error: true   # non-blocking until Phase C fixtures exist

  # ─── Node.js: Web ─────────────────────────────────────────────────────────────
  web-lint-test:
    name: Web — Lint + Type-check + Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check-types
        continue-on-error: true   # non-blocking until Phase D components exist

      - name: Vitest
        run: pnpm test
        continue-on-error: true   # non-blocking until Phase D tests exist

  # ─── Docker Build Smoke Test ──────────────────────────────────────────────────
  docker-build:
    name: Docker — Build all images
    runs-on: ubuntu-latest
    needs: [api-lint-test, crawler-lint-test, web-lint-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t jobsplatform-api:ci ./apps/api

      - name: Build Crawler image
        run: docker build -f infra/docker/crawler.Dockerfile -t jobsplatform-crawler:ci ./apps/crawler

      - name: Build Web image
        run: docker build -f infra/docker/web.Dockerfile -t jobsplatform-web:ci ./apps/web
